experiment_name: t4_10h_code_repair
hardware_profile: colab_t4_16gb

model:
  base_model: deepseek-ai/DeepSeek-R1-Distill-Qwen-1.5B
  fallback_model: Qwen/Qwen2.5-1.5B-Instruct
  quantization: 4bit
  lora_rank: 8
  lora_alpha: 16
  lora_dropout: 0.05

generation:
  candidates_per_task: 4
  temperature: 0.6
  top_p: 0.9
  max_new_tokens: 384

training:
  learning_rate: 0.0002
  epochs: 1
  max_seq_length: 1024
  train_batch_size: 1
  gradient_accumulation_steps: 8
  target_train_rows: 300
  max_train_rows: 800

evaluation:
  max_eval_tasks_per_split: 50
  pass_at_k: [1, 3, 4]
  timeout_seconds: 2.0
  require_hidden_tests: true
  require_random_sft_control: true

budget:
  expected_gpu_hours: 4.0-8.0
  hard_stop_gpu_hours: 10.0

